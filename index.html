<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Liberfarma — Raccolta Ordini</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --green:#1a6b3c; --green-light:#e8f5ee; --accent:#f0a500; --text:#1a1a1a; --muted:#6b7280; --border:#e5e7eb; --white:#ffffff; }
body { font-family:'DM Sans',sans-serif; background:#333; color:var(--text); display:flex; justify-content:center; }
.app { width:100%; max-width:430px; height:100vh; height:100dvh; background:var(--white); display:flex; flex-direction:column; overflow:hidden; }
.header { background:var(--green); padding:18px 20px; flex-shrink:0; }
.logo { font-family:'DM Serif Display',serif; color:white; font-size:22px; }
.logo span { color:var(--accent); }
.content { flex:1; overflow-y:auto; padding:20px; }
.section { display:none; }
.section.active { display:block; }
.field { margin-bottom:15px; }
label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:5px; }
input { width:100%; padding:12px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; }
.prod-card { border:1.5px solid var(--border); border-radius:12px; margin-bottom:10px; padding:12px; }
.prod-card.on { border-color:var(--green); background:var(--green-light); }
.qty-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
.qty-btn { padding:10px; border:none; background:var(--green); color:white; border-radius:8px; font-weight:bold; }
.bottom-bar { padding:15px; border-top:1px solid var(--border); display:flex; gap:10px; }
.btn { flex:1; padding:15px; border-radius:12px; border:none; font-weight:600; cursor:pointer; }
.btn-next { background:var(--green); color:white; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; align-items:center; justify-content:center; color:white; }
.overlay.show { display:flex; }
</style>
</head>
<body>
<div class="app">
  <div class="header"><div class="logo">Liber<span>farma</span></div></div>
  <div class="content" id="content">
    <div class="section active" id="s0">
      <div class="field"><label>Agente</label><input type="text" id="agente"></div>
      <div class="field"><label>Cliente</label><input type="text" id="ragione_sociale"></div>
      <div class="field"><label>Località</label><input type="text" id="localita"></div>
      <div class="field"><label>Provincia</label><input type="text" id="provincia" maxlength="2"></div>
    </div>
    <div class="section" id="s1"><div id="prod-list"></div></div>
    <div class="section" id="s2">
        <p>Seleziona Pagamento nelle note o prosegui per l'invio.</p>
        <div class="field"><label>Note</label><input type="text" id="note"></div>
    </div>
    <div class="section" id="s3"><div id="recap"></div></div>
  </div>
  <div class="bottom-bar">
    <button class="btn" onclick="prev()" id="b-back" style="display:none">Indietro</button>
    <button class="btn btn-next" onclick="next()" id="b-next">Avanti</button>
  </div>
</div>
<div class="overlay" id="overlay">Invio in corso...</div>
