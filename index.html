<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Liberfarma — Raccolta Ordini</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root { --green:#1a6b3c; --accent:#f0a500; --bg:#f8faf9; --border:#e5e7eb; --white:#ffffff; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'DM Sans', sans-serif; background:#333; display:flex; justify-content:center; }
.app { width:100%; max-width:430px; height:100vh; height:100dvh; background:var(--white); display:flex; flex-direction:column; overflow:hidden; }
.header { background:var(--green); padding:20px; color:white; flex-shrink:0; }
.logo { font-family:'DM Serif Display', serif; font-size:24px; }
.logo span { color:var(--accent); }
.steps { display:flex; gap:6px; margin-top:15px; }
.step-dot { height:4px; flex:1; background:rgba(255,255,255,0.2); border-radius:2px; }
.step-dot.active { background:var(--accent); }
.content { flex:1; overflow-y:auto; padding:20px; background:var(--bg); }
.section { display:none; }
.section.active { display:block; }
.sec-title { font-size:11px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:1px; margin-bottom:15px; display:flex; align-items:center; gap:10px; }
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }
.field { margin-bottom:15px; }
label { display:block; font-size:11px; font-weight:700; color:#666; margin-bottom:5px; }
input { width:100%; padding:14px; border:1.5px solid var(--border); border-radius:12px; font-size:16px; font-family:inherit; outline:none; }
.prod-card { background:white; border:1.5px solid var(--border); border-radius:15px; margin-bottom:12px; padding:15px; transition: 0.2s; }
.prod-card.on { border-color:var(--green); box-shadow:0 4px 12px rgba(26,107,60,0.08); }
.qty-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
.qty-ctrl { display:flex; align-items:center; border:1.5px solid var(--border); border-radius:10px; overflow:hidden; background:white; }
.qty-btn { width:40px; height:42px; border:none; background:var(--bg); font-size:20px; color:var(--green); cursor:pointer; }
.qty-val { flex:1; text-align:center; font-weight:700; font-size:16px; }
.esp-box { margin-top:12px; padding:10px; background:var(--bg); border-radius:10px; display:flex; align-items:center; justify-content:space-between; font-size:13px; font-weight:600; }
.toggle { width:40px; height:22px; background:#ddd; border-radius:11px; position:relative; cursor:pointer; transition:0.2s; }
.toggle.on { background:var(--green); }
.toggle::after { content:''; position:absolute; width:18px; height:18px; background:white; border-radius:50%; top:2px; left:2px; transition:0.2s; }
.toggle.on::after { transform:translateX(18px); }
.bottom-bar { background:white; padding:15px 20px; border-top:1px solid var(--border); display:flex; gap:10px; }
.btn { flex:1; padding:16px; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-next { background:var(--green); color:white; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center; color:white; flex-direction:column; gap:15px; }
.overlay.show { display:flex; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Liber<span>farma</span></div>
    <div class="steps"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div></div>
  </div>
  <div class="content">
    <div class="section active" id="s0">
      <div class="sec-title">Dati Identificativi</div>
      <div class="field"><label>Nome Agente</label><input type="text" id="agente"></div>
      <div class="field"><label>Ragione Sociale Cliente</label><input type="text" id="ragione_sociale"></div>
      <div class="field"><label>Località</label><input type="text" id="localita"></div>
      <div class="field"><label>Provincia (Sigla)</label><input type="text" id="provincia" maxlength="2" style="text-transform:uppercase"></div>
      <div class="field"><label>Data Ordine</label><input type="date" id="data_ordine"></div>
    </div>
    <div class="section" id="s1">
      <div class="sec-title">Prodotti Disponibili</div>
      <div id="lista-prodotti"></div>
    </div>
    <div class="section" id="s2">
      <div class="sec-title">Pagamento e Note</div>
      <div class="field"><label>Note / Modalità di Pagamento</label>
      <input type="text" id="note" placeholder="es. Ri.Ba 60gg FM"></div>
    </div>
    <div class="section" id="s3">
      <div class="sec-title">Riepilogo Finale</div>
      <div id="recap-box"></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn" style="background:#eee; display:none" id="btn-back" onclick="prev()">Indietro</button>
    <button class="btn btn-next" id="btn-next" onclick="next()">Avanti →</button>
  </div>
</div>
<div class="overlay" id="overlay">Invio in corso...</div>

<script>
// ↓ INCOLLA QUI IL TUO URL /EXEC
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbyqaxIj30RUeSA4Gd7l4b9FB4le8RtwpDTLmfymB1LVLxnEI7cB5PUbNDAt6udS3jFtkg/exec';

const PRODS = [
  {id:'blu', name:'Liberblu Gocce', pp:19.4, coll:true},
  {id:'spray', name:'Liberspray Spray', pp:19.4, coll:true},
  {id:'vision', name:'Libervision 30 Bust.', pp:49.1, coll:false},
  {id:'vit', name:'Libervit 30 Bust.', pp:29.3, coll:false},
  {id:'mio', name:'Miolut 20 Stick', pp:25.9, coll:false},
  {id:'idra', name:'Idramin 20 Cpr', pp:25.0, coll:false},
  {id:'cum', name:'Cumaret 20 Cpr', pp:22.9, coll:false}
];
PRODS.forEach(p => { p.pz=0; p.om=0; p.esp=false; });

function init() {
  document.getElementById('data_ordine').value = new Date().toISOString().split('T')[0];
  document.getElementById('lista-prodotti').innerHTML = PRODS.map(p => `
    <div class="prod-card" id="card-${p.id}">
      <div style="font-weight:700; color:var(--green)">${p.name}</div>
      <div class="qty-row">
        <div><label>Pagati</label><div class="qty-ctrl">
          <button class="qty-btn" onclick="ch('${p.id}','pz',-1)">-</button>
          <div class="qty-val" id="pz-${p.id}">0</div>
          <button class="qty-btn" onclick="ch('${p.id}','pz',1)">+</button>
        </div></div>
        <div><label>Omaggi</label><div class="qty-ctrl">
          <button class="qty-btn" onclick="ch('${p.id}','om',-1)">-</button>
          <div class="qty-val" id="om-${p.id}">0</div>
          <button class="qty-btn" onclick="ch('${p.id}','om',1)">+</button>
        </div></div>
      </div>
      ${p.coll ? `<div class="esp-box"><span>Espositore da banco</span><div class="toggle" id="tog-${p.id}" onclick="tgEsp('${p.id}')"></div></div>` : ''}
    </div>`).join('');
}

function ch(id,t,v) {
  const p = PRODS.find(x=>x.id===id); p[t] = Math.max(0, p[t]+v);
  document.getElementById(t+'-'+id).innerText = p[t];
  document.getElementById('card-'+id).classList.toggle('on', (p.pz+p.om)>0);
}
function tgEsp(id) {
  const p = PRODS.find(x=>x.id===id); p.esp = !p.esp;
  document.getElementById('tog-'+id).classList.toggle('on', p.esp);
}

let step = 0;
function next() {
  if(step === 3) { submit(); return; }
  step++;
  if(step === 3) buildRecap();
  update();
}
function prev() { step--; update(); }

function update() {
  document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===step));
  document.querySelectorAll('.step-dot').forEach((d,i) => d.classList.toggle('active', i===step));
  document.getElementById('btn-back').style.display = step===0 ? 'none' : 'block';
  document.getElementById('btn-next').innerText = step===3 ? 'Invia Ordine' : 'Avanti →';
}

function buildRecap() {
  const tot = PRODS.reduce((a,p) => a + (p.pz*p.pp*0.5), 0);
  let html = `<div style="background:var(--green); color:white; padding:15px; border-radius:12px; margin-bottom:15px">
    <div style="font-size:12px; opacity:0.8">Totale Cessione</div>
    <div style="font-size:24px; font-weight:700">€${tot.toFixed(2)}</div>
  </div>`;
  html += PRODS.filter(p=>(p.pz+p.om)>0).map(p => `
    <div style="background:white; padding:12px; border-radius:10px; border:1px solid #eee; margin-bottom:5px">
      <b>${p.name}</b> ${p.esp ? '<span style="color:var(--green); font-size:10px"> + ESPOSITORE</span>' : ''}<br>
      <small>${p.pz} Pagati + ${p.om} Omaggi</small>
    </div>`).join('');
  document.getElementById('recap-box').innerHTML = html || "Nessun prodotto selezionato";
}

async function submit() {
  const tot = PRODS.reduce((a,p)=>a+(p.pz*p.pp*0.5),0).toFixed(2);
  const payload = {
    agente: document.getElementById('agente').value,
    ragione_sociale: document.getElementById('ragione_sociale').value,
    localita: document.getElementById('localita').value,
    provincia: document.getElementById('provincia').value.toUpperCase(),
    data: document.getElementById('data_ordine').value,
    pagamento: document.getElementById('note').value,
    totale_cessione: tot,
    pdf_html: generaPdf(tot)
  };

  document.getElementById('overlay').classList.add('show');
  try {
    await fetch(WEBHOOK, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) });
    alert('Ordine inviato correttamente!');
    location.reload();
  } catch(e) { alert('Errore invio'); }
  finally { document.getElementById('overlay').classList.remove('show'); }
}

function generaPdf(tot) {
  const righe = PRODS.filter(p=>(p.pz+p.om)>0).map(p=>`
    <tr>
      <td style="padding:10px; border-bottom:1px solid #eee">
        <b>${p.name}</b>${p.esp ? '<br><span style="color:#1a6b3c; font-size:10px">+ ESPOSITORE DA BANCO</span>' : ''}
      </td>
      <td style="text-align:center">${p.pz}</td>
      <td style="text-align:center">${p.om}</td>
      <td style="text-align:right">€${(p.pz*p.pp*0.5).toFixed(2)}</td>
    </tr>`).join('');
  return `<html><body style="font-family:sans-serif; padding:30px; color:#333">
    <h1 style="color:#1a6b3c">Liberfarma</h1>
    <p>Agente: ${document.getElementById('agente').value}<br>Cliente: ${document.getElementById('ragione_sociale').value}</p>
    <table style="width:100%; border-collapse:collapse; margin-top:15px">
      <tr style="background:#f4f4f4"><th>Prodotto</th><th>Pezzi</th><th>Omaggi</th><th>Totale</th></tr>
      ${righe}
    </table>
    <h2 style="text-align:right; margin-top:20px">Totale Cessione: €${tot}</h2>
    <p>Pagamento: ${document.getElementById('note').value}</p>
  </body></html>`;
}
init();
</script>
</body>
</html>
